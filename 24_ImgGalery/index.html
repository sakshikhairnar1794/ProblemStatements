<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Image Gallery</h1>

    <!-- Buttons -->

    <div class="buttons">
        <button onclick="filterimages('all')">All</button>
        <button onclick="filterimages ('nature')">Nature</button>
        <button onclick="filterimages ('city')">City</button>

    </div>

    <div class="gallery">

        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Altja_j%C3%B5gi_Lahemaal.jpg" class="nature">
        <img src="https://img.freepik.com/free-photo/new-york-city_649448-1679.jpg?semt=ais_hybrid&w=740&q=80" class="city">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/049/855/347/small/nature-background-high-resolution-wallpaper-for-a-serene-and-stunning-view-photo.jpg" class="nature">
        <img src="https://img.freepik.com/free-photo/los-angeles-downtown-buildings-night_649448-298.jpg?semt=ais_hybrid&w=740&q=80" class="city">
        <img src="https://gosharpener.com/content/uploads/photos/2024/09/sngine_049cc2e2c71a11e133a4d0921f515a83.webp" class="nature">

    </div>

    <script src="script.js"></script>
</body>
</html>
