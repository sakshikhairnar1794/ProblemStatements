<!DOCTYPE html>
<html>
<head>
  <title>Product Filtering</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Product Filter</h2>

<div class="buttons">
  <button onclick="filterProducts('all')">All</button>
  <button onclick="filterProducts('electronics')">Electronics</button>
  <button onclick="filterProducts('clothing')">Clothing</button>
</div>

<div class="products">

  <div class="product electronics">
    <h4>Laptop</h4>
    <p>₹50000</p>
  </div>

  <div class="product clothing">
    <h4>T-Shirt</h4>
    <p>₹500</p>
  </div>

  <div class="product electronics">
    <h4>Mobile</h4>
    <p>₹20000</p>
  </div>

  <div class="product clothing">
    <h4>Jeans</h4>
    <p>₹1500</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
