<!DOCTYPE html>
<html>
<head>
  <title>Stopwatch</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>Stopwatch</h2>

<h1 id="time">0</h1>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="reset()">Reset</button>

<script>
  let count = 0;
  let timer = null;

  function start() {
    if (timer === null) {
      timer = setInterval(function() {
        count++;
        document.getElementById("time").innerText = count;
      }, 1000);
    }
  }

  function stop() {
    clearInterval(timer);
    timer = null;
  }

  function reset() {
    stop();
    count = 0;
    document.getElementById("time").innerText = count;
  }
</script>

</body>
</html>
