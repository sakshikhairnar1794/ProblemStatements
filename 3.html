<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Toggle</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    h2 {
      margin-bottom: 20px;
    }

    .toggle {
      margin-bottom: 20px;
    }

    .plans {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 150px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .price {
      font-size: 24px;
      margin: 10px 0;
      color: #333;
    }

    button {
      padding: 8px 12px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h2>Pricing Plans</h2>

  <!-- Toggle -->
  <div class="toggle">
    <label>
      <input type="checkbox" id="toggleSwitch">
      Yearly Billing
    </label>
  </div>

  <!-- Plans -->
  <div class="plans">
    <div class="card">
      <h3>Basic</h3>
      <div class="price" id="basic">$10/mo</div>
    </div>

    <div class="card">
      <h3>Pro</h3>
      <div class="price" id="pro">$20/mo</div>
    </div>

    <div class="card">
      <h3>Premium</h3>
      <div class="price" id="premium">$30/mo</div>
    </div>
  </div>

  <script>
    const toggle = document.getElementById("toggleSwitch");

    toggle.addEventListener("change", function () {
      if (this.checked) {
        // Yearly prices (discounted)
        document.getElementById("basic").textContent = "$100/yr";
        document.getElementById("pro").textContent = "$200/yr";
        document.getElementById("premium").textContent = "$300/yr";
      } else {
        // Monthly prices
        document.getElementById("basic").textContent = "$10/mo";
        document.getElementById("pro").textContent = "$20/mo";
        document.getElementById("premium").textContent = "$30/mo";
      }
    });
  </script>

</body>
</html>
